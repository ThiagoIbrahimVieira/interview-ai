services:
  - type: web
    name: interviewai-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: false
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: interviewai-db
          property: connectionString
      - key: ALLOWED_ORIGINS
        value: "https://interview-ai-ecru-theta.vercel.app"
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 30
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: 7
      - key: RATE_LIMIT_PER_MINUTE
        value: 60
      - key: RATE_LIMIT_LOGIN_PER_MINUTE
        value: 10
      - key: RATE_LIMIT_AI_PER_MINUTE
        value: 20
      - key: MAX_LOGIN_ATTEMPTS
        value: 5
      - key: LOCKOUT_MINUTES
        value: 15
      - key: MAX_INPUT_LENGTH
        value: 5000
      - key: MAX_CUSTOM_INSTRUCTIONS_LENGTH
        value: 2000
      - key: MAX_PER_PAGE
        value: 50
      - key: LOG_LEVEL
        value: INFO
    healthCheckPath: /health

  - type: database
    name: interviewai-db
    databaseName: interviewai
    plan: free
